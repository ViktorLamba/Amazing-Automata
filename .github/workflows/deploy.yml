name: CI/CD Docker App

on:
  push:
    branches:
      - ci-out-project-test  # ветка, при пуше в которую срабатывает Action

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy and build on server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # путь на сервере, можно любое имя
            SERVER_DIR=/root/Amazing-Automata

            # если папки нет, клонируем репозиторий
            cd $SERVER_DIR || git clone git@github.com:ViktorLamba/Amazing-Automata.git $SERVER_DIR
            cd $SERVER_DIR

            # обновляем код
            git pull origin main

            # билдим Docker образ из папки project/test
            docker build -t my-app:latest ./project/test

            # перезапускаем контейнер
            docker stop my-app || true
            docker rm my-app || true
            docker run -d --name my-app -p 80:3000 my-app:latest
